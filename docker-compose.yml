services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aisb
      POSTGRES_PASSWORD: aisb
      POSTGRES_DB: aisb
    ports:
      - "5433:5432"
    volumes:
      - aisb_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - aisb_redis:/data

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - aisb_qdrant:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-06-11T03-13-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aisb_minio:/data

volumes:
  aisb_pg:
  aisb_redis:
  aisb_qdrant:
  aisb_minio:
